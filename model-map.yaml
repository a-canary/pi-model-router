# Authoritative model → GDPval slug mapping
# Used as primary lookup; automatic token matching is fallback only.
#
# Key: model ID as returned by provider API (after stripping provider prefix)
# Value: GDPval slug, or null (~) if model has no benchmark score
#
# Wildcard: entries ending with "*" match any model starting with that prefix
# This handles date-versioned models like claude-sonnet-4-5-20250929
#
# Rules derived from manual research:
#   -TEE (Trusted Execution Environment): same model, use base score
#   -FP8 (8-bit quantization): same model, negligible quality diff
#   -Turbo/-Flash/-Mini: distinct weaker variants, need own entry or null
#   -Thinking/-Instruct: inference params, GDPval tests these separately
#   -YYMM/-YYYYMMDD dates: version tag, may indicate distinct benchmark entry

# ── Anthropic ──────────────────────────────────────────────────────────
claude-sonnet-4-6:                        claude-sonnet-4-6
claude-opus-4-6:                          claude-opus-4-6
claude-sonnet-4-5-*:                      claude-4-5-sonnet
claude-opus-4-5-*:                        claude-opus-4-5
claude-sonnet-4-2*:                       claude-4-sonnet          # Sonnet 4.0
claude-opus-4-2*:                         ~                        # Opus 4.0 — no entry
claude-opus-4-1-*:                        ~                        # Opus 4.1 — no entry
claude-haiku-4-5-*:                       claude-4-5-haiku
claude-3-haiku-*:                         claude-3-haiku
claude-3-5-haiku-*:                       claude-3-5-haiku

